<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Shiori</title>
  <style>html,body{margin:0;height:100%;background:#111;color:#888;font:14px system-ui,sans-serif;display:flex;align-items:center;justify-content:center}</style>
</head>
<body>
<script>
  // GitHub Pages serves this file (with a 404 status) for the clean deep links /reader?…, /settings —
  // they aren't real files. A hard reload bypasses the service worker, so we register it and reload:
  // that reload IS served by the worker (as the mapped app page), with the address bar left clean.
  // The retry flag (cleared by the app once it boots, in boot.js) lets this run on every hard reload,
  // while bailing to the plain app file if the worker can't take over. Truly unknown paths say so.
  (async () => {
    const RETRY = 'shiori-sw-retry';
    const seg = (location.pathname.replace(/\/+$/, '').split('/').pop() || '').replace(/\.html$/, '');
    const known = seg === 'settings' || seg === 'reader' || seg === 'library' || seg === 'overview';
    if (!known) { document.body.textContent = 'Not found.'; return; }
    if ('serviceWorker' in navigator && !sessionStorage.getItem(RETRY)) {
      sessionStorage.setItem(RETRY, '1');
      try {
        await navigator.serviceWorker.register('sw.js', { type: 'module' });
        await navigator.serviceWorker.ready;
        location.reload();
        return;
      } catch {}
    }
    location.replace('app/' + seg + '.html' + location.search + location.hash);   // worker unavailable → real file
  })();
</script>
<noscript>Not found.</noscript>
</body>
</html>
