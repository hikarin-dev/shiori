<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Shiori</title>
  <style>html,body{margin:0;height:100%;background:#111;color:#888;font:14px system-ui,sans-serif;display:flex;align-items:center;justify-content:center}</style>
</head>
<body>
<script>
  // Static-host (GitHub Pages) fallback for clean deep links (/settings, /reader?…) on the first
  // visit, before the root service worker controls the origin. Register the worker, then reload —
  // the reload is served as the mapped app page, with the address bar left clean. The dev server
  // does this server-side, so this only runs cold on a host like GitHub Pages. Unknown paths just
  // say "Not found" (no reload, so a genuinely missing URL can't loop).
  (async () => {
    const seg = (location.pathname.replace(/\/+$/, '').split('/').pop() || '').replace(/\.html$/, '');
    const known = seg === 'settings' || seg === 'reader' || seg === 'library';
    if (known && 'serviceWorker' in navigator && !sessionStorage.shioriBoot) {
      sessionStorage.shioriBoot = '1';
      try {
        await navigator.serviceWorker.register('sw.js', { type: 'module' });
        await navigator.serviceWorker.ready;
        location.reload();
        return;
      } catch {}
    }
    document.body.textContent = 'Not found.';
  })();
</script>
<noscript>Not found.</noscript>
</body>
</html>
